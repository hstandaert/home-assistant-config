---
# Heating automation

- alias: Heating
  id: heating
  description: >-
    When we leave home, we turn off the heating and when we come home, we turn it back
    on.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.someone_home
      to: "on"
      id: turn_on
    - platform: state
      entity_id: binary_sensor.someone_home
      to: "off"
      id: turn_off
    - platform: time
      at: "00:00:00"
      id: reset

  condition:
    - condition: state
      entity_id: input_boolean.house_mode_guest
      state: "off"

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'turn_off' }}"
          sequence:
            - action: climate.set_hvac_mode
              data:
                hvac_mode: "off"
              target:
                entity_id:
                  - climate.office_heater
                  - climate.heating_boys
                  - climate.heating_girls
            - action: climate.set_hvac_mode
              data:
                hvac_mode: "auto"
              target:
                entity_id:
                  - climate.woonkamer
            - action: select.select_option
              target:
                entity_id: select.tado_thuis_presence_mode
              data:
                option: away
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'turn_on' }}"
          sequence:
            - action: climate.set_hvac_mode
              data:
                hvac_mode: "auto"
              target:
                entity_id:
                  - climate.woonkamer
            - action: select.select_option
              target:
                entity_id: select.tado_thuis_presence_mode
              data:
                option: home
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'reset' }}"
          sequence:
            - action: climate.set_hvac_mode
              data:
                hvac_mode: "auto"
              target:
                entity_id:
                  - climate.woonkamer
