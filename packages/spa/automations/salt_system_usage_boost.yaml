---
# Spa Salt System - Usage Boost automation

- alias: Spa Salt System - Usage Boost
  id: spa_salt_system_usage_boost
  description: >-
    Manually triggered sanitizer boost to oxidize organic matter after spa usage.

    Trigger: Press the "Spa Usage Complete" button when exiting the spa.

    Action: Runs sanitizer for 2 hours regardless of daily target or solar state.
    Ensures immediate water treatment post-usage.

    Safety: Always starts pump first, waits 5s, then sanitizer.
  mode: single
  trigger:
    - platform: state
      entity_id: input_button.spa_usage_complete
      to: "on"
      id: usage_complete_button

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.intex_chevron_6p_power_switch
    - delay: "00:00:05"
    - service: switch.turn_on
      target:
        entity_id: switch.intex_chevron_6p_filter
    - delay: "00:00:05"
    - service: switch.turn_on
      target:
        entity_id: switch.intex_chevron_6p_salt_system
    - delay: "02:00:00"
    - service: switch.turn_off
      target:
        entity_id: switch.intex_chevron_6p_salt_system
