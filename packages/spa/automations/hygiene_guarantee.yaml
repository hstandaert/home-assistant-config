---
# Spa Hygiene Guarantee - Night Tariff Safety Net automation

- alias: Spa Hygiene Guarantee - Night Tariff Safety Net
  id: spa_hygiene_guarantee
  description: >-
    Backup automation to ensure sanitizer reaches daily runtime target.

    Trigger: When night tariff activates (sensor.p1_meter_tarief transitions to "2").
    Runs on cheap electricity instead of the previous fixed 20:00 trigger (which fired
    during expensive day rate).

    Condition: Only runs if daily runtime is still below target hours.

    Action: Starts pump first, waits 5s, then runs sanitizer until target reached (with
    4-hour timeout safety).
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.p1_meter_tarief
      to: "2"
      id: night_tariff_start

  condition:
    - condition: template
      value_template: >-
        {% set runtime = states('sensor.spa_sanitizer_runtime_today') | float(0) %}
        {% set target = states('input_number.spa_target_hours') | float(0) %}
        {{ runtime < target }}

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.intex_chevron_6p_power_switch
    - delay: "00:00:05"
    - service: switch.turn_on
      target:
        entity_id: switch.intex_chevron_6p_filter
    - delay: "00:00:05"
    - service: switch.turn_on
      target:
        entity_id: switch.intex_chevron_6p_salt_system
    - wait_template: >-
        {% set current = states('sensor.spa_sanitizer_runtime_today') | float(0) %}
        {% set target = states('input_number.spa_target_hours') | float(0) %}
        {{ current >= target }}
      timeout: "04:00:00"
      continue_on_timeout: true
    - service: switch.turn_off
      target:
        entity_id: switch.intex_chevron_6p_salt_system
    - service: switch.turn_off
      target:
        entity_id: switch.intex_chevron_6p_filter
