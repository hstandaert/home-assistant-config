---
# Spa Heater - Smart Schedule automation

- alias: Spa Heater - Smart Schedule
  id: spa_heater_schedule
  description: >-
    Controls heater based on energy availability when smart mode is enabled.

    Enables heater (smart mode ON, heater currently OFF) when:
    - Energy mode is solar_full (solar covers heater wattage), OR
    - Energy mode is cheap (night tariff active).

    Disables heater (smart mode ON, heater currently ON, temp above minimum floor) when:
    - Energy mode becomes expensive or solar_partial.

    Emergency override (regardless of smart mode or energy mode):
    - Water temperature drops below input_number.spa_min_temperature for 5 minutes.
      Prevents costly reheat from a cold baseline.

    The spa's built-in thermostat handles the upper temperature cutoff — no HA condition
    needed on the enable side.
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "solar_full"
      id: energy_solar_full
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "cheap"
      id: energy_cheap
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "expensive"
      id: energy_expensive
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "solar_partial"
      id: energy_solar_partial
    - platform: numeric_state
      entity_id: sensor.intex_chevron_6p_spa_temperature
      below: input_number.spa_min_temperature
      for:
        minutes: 5
      id: temp_below_minimum

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['energy_solar_full', 'energy_cheap'] }}"
            - condition: state
              entity_id: input_boolean.spa_heater_smart_mode
              state: "on"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_power_switch
            - delay: "00:00:05"
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_heater_toggle

        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['energy_expensive', 'energy_solar_partial'] }}"
            - condition: state
              entity_id: input_boolean.spa_heater_smart_mode
              state: "on"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "on"
            - condition: numeric_state
              entity_id: sensor.intex_chevron_6p_spa_temperature
              above: input_number.spa_min_temperature
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.intex_chevron_6p_heater_toggle

        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'temp_below_minimum' }}"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_power_switch
            - delay: "00:00:05"
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_heater_toggle
