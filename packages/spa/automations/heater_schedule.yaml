---
# Spa Heater - Smart Schedule automation

- alias: Spa Heater - Smart Schedule
  id: spa_heater_schedule
  description: >-
    Controls heater based on energy availability when smart mode is enabled.

    Enables heater (smart mode ON, heater currently OFF) when:
    - Energy mode is solar_full (solar covers heater wattage).

    Disables heater (smart mode ON, heater currently ON, temp above minimum floor) when:
    - Energy mode becomes expensive or solar_partial.
    - Smart mode is turned on while energy mode is already expensive or solar_partial.

    Caps smart mode heating at input_number.spa_min_temperature (standby target):
    - When temperature rises above spa_min_temperature and energy mode is NOT solar_full,
      heater is turned off. During solar_full, free surplus allows heating to the spa's
      own thermostat setpoint (37°).

    Emergency override (regardless of smart mode or energy mode):
    - Water temperature drops below input_number.spa_min_temperature for 5 minutes.
      Prevents costly reheat from a cold baseline.
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "solar_full"
      id: energy_solar_full
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "expensive"
      id: energy_expensive
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "solar_partial"
      id: energy_solar_partial
    - platform: numeric_state
      entity_id: sensor.intex_chevron_6p_spa_temperature
      below: input_number.spa_min_temperature
      for:
        minutes: 5
      id: temp_below_minimum
    - platform: numeric_state
      entity_id: sensor.intex_chevron_6p_spa_temperature
      above: input_number.spa_min_temperature
      id: temp_above_minimum
    - platform: state
      entity_id: input_boolean.spa_heater_smart_mode
      to: "on"
      id: smart_mode_on

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'energy_solar_full' }}"
            - condition: state
              entity_id: input_boolean.spa_heater_smart_mode
              state: "on"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "off"
            - condition: state
              entity_id: switch.intex_chevron_6p_salt_system
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_power_switch
            - delay: "00:00:05"
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_heater_toggle

        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['energy_expensive', 'energy_solar_partial'] }}"
            - condition: state
              entity_id: input_boolean.spa_heater_smart_mode
              state: "on"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "on"
            - condition: numeric_state
              entity_id: sensor.intex_chevron_6p_spa_temperature
              above: input_number.spa_min_temperature
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.intex_chevron_6p_heater_toggle

        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'smart_mode_on' }}"
            - condition: template
              value_template: "{{ states('sensor.spa_energy_mode') in ['expensive', 'solar_partial'] }}"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "on"
            - condition: numeric_state
              entity_id: sensor.intex_chevron_6p_spa_temperature
              above: input_number.spa_min_temperature
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.intex_chevron_6p_heater_toggle

        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'temp_above_minimum' }}"
            - condition: state
              entity_id: input_boolean.spa_heater_smart_mode
              state: "on"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "on"
            - condition: not
              conditions:
                - condition: state
                  entity_id: sensor.spa_energy_mode
                  state: "solar_full"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.intex_chevron_6p_heater_toggle

        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'temp_below_minimum' }}"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "off"
            - condition: state
              entity_id: switch.intex_chevron_6p_salt_system
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_power_switch
            - delay: "00:00:05"
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_heater_toggle
