---
# Spa Salt System - Solar Check automation

- alias: Spa Salt System - Solar Check
  id: spa_salt_system_solar_check
  description: >-
    Automatically runs spa sanitizer when solar generation covers consumption.

    Trigger: When sensor.spa_energy_mode transitions to solar_full or solar_partial,
    sustained for 5 minutes. Also triggers when heater turns off (2-minute debounce)
    while energy mode is still solar_full or solar_partial — this covers the gap where
    solar_start doesn't re-fire after the heater stops. Stops when mode transitions to
    cheap or expensive (10-minute debounce for expensive, immediate for cheap/tariff
    change) OR when daily runtime target is reached.

    Safety: Checks sanitizer is OFF, heater is OFF, and daily runtime is below target
    before activating. Start conditions are scoped to the solar_start/heater_stopped
    branch only — stop branches always execute to ensure the sanitizer is never left
    running. Always starts pump first, waits 5s, then sanitizer.
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "solar_full"
      for:
        minutes: 5
      id: solar_start
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "solar_partial"
      for:
        minutes: 5
      id: solar_start
    - platform: state
      entity_id: switch.intex_chevron_6p_heater_toggle
      to: "off"
      for:
        minutes: 2
      id: heater_stopped
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "cheap"
      id: solar_end
    - platform: state
      entity_id: sensor.spa_energy_mode
      to: "expensive"
      for:
        minutes: 10
      id: solar_end
    - platform: template
      value_template: >-
        {% set current = states('sensor.spa_sanitizer_runtime_today') | float(0) %}
        {% set target = states('input_number.spa_target_hours') | float(0) %}
        {{ current >= target }}
      id: target_reached

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['solar_start', 'heater_stopped'] }}"
            - condition: template
              value_template: >-
                {{ states('sensor.spa_energy_mode') in ['solar_full', 'solar_partial'] }}
            - condition: state
              entity_id: switch.intex_chevron_6p_salt_system
              state: "off"
            - condition: state
              entity_id: switch.intex_chevron_6p_heater_toggle
              state: "off"
            - condition: template
              value_template: >-
                {{ states('sensor.spa_sanitizer_runtime_today') | float(0) <
                   states('input_number.spa_target_hours') | float(0) }}
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_power_switch
            - delay: "00:00:05"
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_filter
            - delay: "00:00:05"
            - service: switch.turn_on
              target:
                entity_id: switch.intex_chevron_6p_salt_system
        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['solar_end', 'target_reached'] }}"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.intex_chevron_6p_salt_system
            - service: switch.turn_off
              target:
                entity_id: switch.intex_chevron_6p_filter
