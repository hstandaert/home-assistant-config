---
# Play Qmusic on Selected Speaker
# This script plays Qmusic on the speaker selected in the input_select.target_speaker entity.

play_qmusic_on_selected_speaker:
  mode: single
  alias: Play Qmusic on Selected Speaker
  sequence:
    - action: media_player.play_media
      target:
        entity_id: >-
          {% if is_state('input_select.target_speaker', 'Woonkamer') %}
            media_player.hub
          {% elif is_state('input_select.target_speaker', 'Kantoor') %}
            media_player.home
          {% elif is_state('input_select.target_speaker', 'Benedenverdieping') %}
            media_player.benedenverdieping
          {% else %}
            media_player.hub
          {% endif %}
      data:
        media:
          media_content_id: media-source://radio_browser/130f37a8-bcba-4d2d-a39d-a1881df1f185
          media_content_type: audio/mpeg
          metadata:
            title: Qmusic
            thumbnail: https://cdn-profiles.tunein.com/s87683/images/logod.png
            media_class: music
            children_media_class: null
            navigateIds:
              - {}
              - media_content_type: app
                media_content_id: media-source://radio_browser
              - media_content_type: music
                media_content_id: media-source://radio_browser/country/BE
            browse_entity_id: media_player.home
