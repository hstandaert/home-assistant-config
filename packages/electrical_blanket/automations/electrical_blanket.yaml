---
# Electrical Blanket automation

- alias: Electrical blanket
  id: electrical_blanket
  description: >-
    Because we like to be warm when going to bed, we automatically turn on the heating
    blanket at a certain time
  mode: single
  trigger:
    - platform: time
      at: "21:00:00"

  condition:
    - condition: state
      entity_id: binary_sensor.someone_home
      state: "on"
    - condition: numeric_state
      entity_id: sensor.openweathermap_feels_like_temperature
      below: 16

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.electrical_blanket
    - service: script.turn_off_electrical_blanket_after_30_minutes
