---
# Spa automation configuration
# spa_target_hours: Daily target runtime for spa sanitizer (in hours).
# Used by automations to determine when sanitizer has run enough.
spa_target_hours:
  name: "Spa Target Sanitizer Hours"
  icon: mdi:clock
  unit_of_measurement: "h"
  min: 0
  max: 8
  step: 0.5
  initial: 3

# spa_solar_threshold: Negative power threshold (Watts) to trigger sanitizer.
# When P1 vermogen drops below this value (excess solar export), sanitizer will start.
# Lower (more negative) = more conservative. Recommended: -100W (60W sanitizer + 40W margin).
spa_solar_threshold:
  name: "Spa Solar Export Threshold"
  icon: mdi:solar-power
  unit_of_measurement: "W"
  min: -2500
  max: 0
  step: 10
  initial: -100
