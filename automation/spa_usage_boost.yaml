---
alias: Spa Usage Boost - Post-Usage Sanitizer
id: spa_usage_boost
description: >-
  Manually triggered sanitizer boost to oxidize organic matter
  (sweat, skin cells) after spa usage.
  
  Trigger: Press the "Spa Usage Complete" button when exiting the spa.
  
  Action: Runs sanitizer for 2 hours regardless of daily target or solar state.
  This ensures immediate water treatment post-usage.
  
  Safety: Always starts pump first, waits 5s, then sanitizer.
mode: single
trigger:
  - platform: state
    entity_id: input_button.spa_usage_complete
    to: "on"
    id: usage_complete_button

action:
  # Ensure pump is running
  - service: switch.turn_on
    target:
      entity_id: switch.intex_chevron_6p_filter
  
  - delay: "00:00:05"
  
  # Start sanitizer for 2-hour boost
  - service: switch.turn_on
    target:
      entity_id: switch.intex_chevron_6p_salt_system
  
  # Run for exactly 2 hours
  - delay: "02:00:00"
  
  # Stop sanitizer after boost period
  - service: switch.turn_off
    target:
      entity_id: switch.intex_chevron_6p_salt_system
