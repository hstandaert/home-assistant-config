---
alias: Spa Hygiene Guarantee - Evening Safety Net
id: spa_hygiene_guarantee
description: >-
  Evening backup automation to ensure sanitizer runs sufficient daily runtime.

  Trigger: Every day at 20:00 (shortly after sunset).

  Condition: If daily runtime is still below target hours, this automation
  runs the sanitizer to reach the target. This is the safety net for cloudy/rainy
  days when solar-driven checks don't accumulate enough runtime.

  Action: Starts pump first, waits 5s, then runs sanitizer until target reached
  (with 4-hour timeout safety). Uses wait_template to continuously monitor
  progress toward goal rather than fixed delay.
mode: single
trigger:
  - platform: time
    at: "20:00:00"
    id: evening_check

condition:
  # Only run if we haven't met today's target yet
  - condition: template
    value_template: >-
      {% set runtime = states('sensor.spa_sanitizer_runtime_today') | float(0) %}
      {% set target = states('input_number.spa_target_hours') | float(0) %}
      {{ runtime < target }}

action:
  # Start pump first
  - service: switch.turn_on
    target:
      entity_id: switch.intex_chevron_6p_filter

  - delay: "00:00:05"

  # Start sanitizer
  - service: switch.turn_on
    target:
      entity_id: switch.intex_chevron_6p_salt_system

  # Wait until target runtime is reached
  - wait_template: >-
      {% set current = states('sensor.spa_sanitizer_runtime_today') | float(0) %}
      {% set target = states('input_number.spa_target_hours') | float(0) %}
      {{ current >= target }}
    timeout: "04:00:00"
    continue_on_timeout: true

  # Stop sanitizer after target is reached
  - service: switch.turn_off
    target:
      entity_id: switch.intex_chevron_6p_salt_system
